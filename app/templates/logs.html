<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs — AI_ASSISTED_RESEARCH</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1>AI_ASSISTED_RESEARCH</h1>
    <div class="header-right">
      <a href="/" class="btn-filtered">← Dashboard</a>
      <a href="/stats" class="btn-filtered">Stats</a>
    </div>
  </header>
  <main>
    <div class="logs-toolbar">
      <span class="log-label">Application logs (last 500 lines) — auto-refreshing every 3s</span>
      <div class="log-filters">
        <label><input type="checkbox" class="level-filter" data-level="ERROR" checked> Errors</label>
        <label><input type="checkbox" class="level-filter" data-level="WARNING" checked> Warnings</label>
        <label><input type="checkbox" class="level-filter" data-level="INFO" checked> Info</label>
        <label><input type="checkbox" id="show-access"> Access logs</label>
      </div>
      <label class="log-scroll-toggle">
        <input type="checkbox" id="auto-scroll" checked> Auto-scroll
      </label>
    </div>
    <div class="log-container"
         id="log-container"
         hx-get="/logs/lines"
         hx-trigger="every 3s"
         hx-target="#log-container"
         hx-swap="innerHTML">
      {% include "partials/log_lines.html" %}
    </div>
  </main>
  <script>
    const container = document.getElementById('log-container');

    function applyFilters() {
      const showAccess = document.getElementById('show-access').checked;
      const levels = {};
      document.querySelectorAll('.level-filter').forEach(cb => {
        levels[cb.dataset.level] = cb.checked;
      });
      document.querySelectorAll('.log-line').forEach(el => {
        const text = el.textContent;
        const isAccess = text.includes('uvicorn.access');
        if (isAccess && !showAccess) { el.style.display = 'none'; return; }
        const level = Object.keys(levels).find(l => text.includes(l));
        el.style.display = (level === undefined || levels[level]) ? '' : 'none';
      });
    }

    function scrollBottom() {
      if (document.getElementById('auto-scroll').checked)
        container.scrollTop = container.scrollHeight;
    }

    document.querySelector('.logs-toolbar').addEventListener('change', applyFilters);
    document.body.addEventListener('htmx:afterSwap', () => { applyFilters(); scrollBottom(); });

    applyFilters();
    scrollBottom();
  </script>
</body>
</html>
